<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPERATOR TERMINAL — Warzone Loadout Requisition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0b0d09;
    --panel:#14170f;
    --panel2:#191d13;
    --line:#2b2f22;
    --amber:#ff8c1a;
    --amber-dim:#7a4c1f;
    --sand:#c9c0a6;
    --bone:#edeae0;
    --alert:#e4483c;
    --ok:#7fbf6a;
    --radius:2px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--void); color:var(--sand); font-family:'JetBrains Mono',monospace;}
  body{
    min-height:100vh;
    background-image:
      linear-gradient(var(--void), var(--void)),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
    padding-bottom:60px;
  }
  h1,h2,h3,.display{font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.04em;}
  ::selection{background:var(--amber); color:var(--void);}

  /* ===== HEADER ===== */
  header{
    border-bottom:1px solid var(--line);
    padding:18px 16px 14px;
    position:sticky; top:0; z-index:20;
    background:rgba(11,13,9,0.96);
    backdrop-filter: blur(4px);
  }
  .hdr-top{display:flex; align-items:baseline; justify-content:space-between; gap:8px;}
  .hdr-top h1{font-size:19px; color:var(--bone); font-weight:700; letter-spacing:0.06em;}
  .hdr-top h1 span{color:var(--amber);}
  .hdr-meta{font-size:10px; color:var(--amber-dim); text-align:right; line-height:1.5;}
  .hdr-meta b{color:var(--amber); font-weight:600;}
  .hdr-sub{font-size:11px; color:var(--sand); opacity:0.65; margin-top:4px; letter-spacing:0.02em;}

  /* ===== MODE SWITCH ===== */
  .switch{
    display:flex; margin:16px 16px 0; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;
  }
  .switch button{
    flex:1; background:var(--panel); color:var(--sand); border:none; padding:12px 8px;
    font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:0.08em; text-transform:uppercase;
    cursor:pointer; transition:all .15s ease; border-right:1px solid var(--line);
  }
  .switch button:last-child{border-right:none;}
  .switch button.active{background:var(--amber); color:var(--void); font-weight:600;}
  .switch button:not(.active):hover{background:var(--panel2); color:var(--bone);}

  main{max-width:640px; margin:0 auto; padding:0 16px;}
  .view{display:none; animation:fadein .25s ease;}
  .view.active{display:block;}
  @keyframes fadein{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}

  /* ===== QUIZ ===== */
  .progress{display:flex; gap:4px; margin:20px 0 6px;}
  .progress .dot{flex:1; height:3px; background:var(--line); border-radius:2px; overflow:hidden;}
  .progress .dot i{display:block; height:100%; width:0%; background:var(--amber); transition:width .3s ease;}
  .progress .dot.done i{width:100%;}
  .progress .dot.active i{width:100%; background:var(--sand);}
  .step-label{font-size:10px; color:var(--amber-dim); letter-spacing:0.1em; margin-bottom:18px;}

  .q-card{border:1px solid var(--line); background:var(--panel); padding:18px 16px 20px; border-radius:var(--radius);}
  .q-card h2{font-size:20px; color:var(--bone); margin-bottom:16px; line-height:1.3;}
  .opt{
    display:block; width:100%; text-align:left; background:var(--void); color:var(--sand);
    border:1px solid var(--line); padding:13px 14px; margin-bottom:8px; border-radius:var(--radius);
    font-family:'JetBrains Mono',monospace; font-size:13.5px; cursor:pointer; transition:all .15s ease;
    position:relative; padding-left:32px;
  }
  .opt::before{
    content:''; position:absolute; left:12px; top:50%; transform:translateY(-50%);
    width:9px; height:9px; border:1px solid var(--amber-dim); border-radius:50%;
  }
  .opt:hover{border-color:var(--amber); color:var(--bone); background:var(--panel2);}
  .opt:hover::before{background:var(--amber); border-color:var(--amber);}

  .back-link{display:inline-block; margin-top:14px; font-size:11px; color:var(--amber-dim); cursor:pointer; letter-spacing:0.05em;}
  .back-link:hover{color:var(--amber);}

  /* ===== ARMORY GRID ===== */
  .filters{display:flex; gap:6px; flex-wrap:wrap; margin:18px 0 14px;}
  .filters button{
    background:transparent; border:1px solid var(--line); color:var(--sand); font-size:10.5px;
    padding:6px 10px; border-radius:var(--radius); cursor:pointer; font-family:'JetBrains Mono',monospace;
    letter-spacing:0.05em; text-transform:uppercase;
  }
  .filters button.active{background:var(--amber); border-color:var(--amber); color:var(--void); font-weight:600;}

  .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;}
  .tag-card{
    border:1px solid var(--line); background:var(--panel); padding:12px; border-radius:var(--radius);
    cursor:pointer; transition:all .15s ease; position:relative; overflow:hidden;
  }
  .tag-card::before{content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:var(--amber-dim);}
  .tag-card:hover{border-color:var(--amber); background:var(--panel2);}
  .tag-card:hover::before{background:var(--amber);}
  .tag-card .tier{position:absolute; top:8px; right:10px; font-family:'Oswald',sans-serif; font-size:11px; font-weight:700; color:var(--amber);}
  .tag-card .cat{font-size:9px; color:var(--amber-dim); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:4px;}
  .tag-card .name{font-family:'Oswald',sans-serif; font-size:15px; color:var(--bone); font-weight:600; margin-bottom:6px; letter-spacing:0.02em;}
  .tag-card .blurb{font-size:10.5px; color:var(--sand); opacity:0.75; line-height:1.4;}

  /* ===== REQUISITION SLIP (result) ===== */
  .slip{
    border:1px solid var(--amber-dim); background:var(--panel); border-radius:var(--radius);
    margin:20px 0; overflow:hidden; animation:reveal .4s ease;
  }
  @keyframes reveal{from{opacity:0; transform:scale(0.98);} to{opacity:1; transform:scale(1);}}
  .slip-head{
    background:var(--amber); color:var(--void); padding:10px 14px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .slip-head .label{font-family:'Oswald',sans-serif; font-size:11px; font-weight:700; letter-spacing:0.12em;}
  .slip-head .id{font-size:10px; opacity:0.8;}
  .slip-body{padding:18px 16px;}
  .slip-body .cat-line{font-size:10px; color:var(--amber-dim); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:2px;}
  .slip-body h2{font-size:26px; color:var(--bone); margin-bottom:10px; line-height:1.15;}
  .slip-body .why{font-size:12.5px; color:var(--sand); line-height:1.6; margin-bottom:16px; padding-bottom:14px; border-bottom:1px dashed var(--line);}
  .attach-row{display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--line); font-size:12.5px; gap:12px;}
  .attach-row:last-of-type{border-bottom:none;}
  .attach-row .slot{color:var(--amber-dim); letter-spacing:0.05em; text-transform:uppercase; font-size:10px; white-space:nowrap; padding-top:2px;}
  .attach-row .part{color:var(--bone); text-align:right;}
  .sec-box{margin-top:16px; padding-top:14px; border-top:1px dashed var(--line);}
  .sec-box .lbl{font-size:10px; color:var(--amber-dim); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:6px;}
  .sec-box .val{font-size:13px; color:var(--sand);}
  .note{margin-top:14px; padding:10px 12px; background:var(--void); border-left:2px solid var(--amber); font-size:11px; color:var(--sand); line-height:1.5;}
  .restart{
    display:block; width:100%; margin-top:16px; background:transparent; border:1px solid var(--line);
    color:var(--amber); padding:12px; font-family:'Oswald',sans-serif; letter-spacing:0.08em; text-transform:uppercase;
    font-size:12px; cursor:pointer; border-radius:var(--radius);
  }
  .restart:hover{border-color:var(--amber); background:var(--panel2);}

  footer{text-align:center; font-size:10px; color:var(--amber-dim); margin-top:30px; letter-spacing:0.05em;}
</style>
</head>
<body>

<header>
  <div class="hdr-top">
    <h1>OPERATOR<span>_</span>TERMINAL</h1>
    <div class="hdr-meta">STAGIONE 4<br><b>Aggiornato 30/06/2026</b></div>
  </div>
  <div class="hdr-sub">Sistema di requisizione loadout — meta Warzone corrente</div>
</header>

<div class="switch">
  <button id="btn-quiz" class="active" onclick="setMode('quiz')">Assistente AI</button>
  <button id="btn-armory" onclick="setMode('armory')">Armeria</button>

<main>

    <div class="grid" id="armory-grid"></div>

  <div id="result-slot"></div>

  <footer>DATI COSTRUITI SU META COMMUNITY — VERIFICA SEMPRE LE PATCH NOTE IN-GAME</footer>

/* ============ QUIZ LOGIC ============ */
const QUESTIONS = [
  {
    key:"range",
    q:"A che distanza preferisci ingaggiare i nemici?",
    opts:[
      {label:"Corpo a corpo, dentro gli edifici", tags:["close","mobility","aggressive"]},
      {label:"Media distanza, versatile", tags:["mid","versatile","allround"]},
      {label:"Lunga distanza, tengo le linee", tags:["long","control","precision"]},
      {label:"Sniping puro, un colpo un kill", tags:["sniper","longrange","precision"]}
    ]
  },
  {
    key:"mode",
    q:"Che modalità giochi più spesso?",
    opts:[
      {label:"Resurgence (mappe piccole, respawn)", tags:["resurgence","aggressive","mobility"]},
      {label:"Battle Royale classico", tags:["battleroyale","control","precision"]}
    ]
  },
  {
    key:"style",
    q:"Qual è il tuo stile di gioco?",
    opts:[
      {label:"Aggressivo, push continuo", tags:["aggressive","mobility"]},
      {label:"Passivo, tengo posizione e osservo", tags:["passive","suppression","control"]},
      {label:"Equilibrato, mi adatto alla situazione", tags:["versatile","allround"]}
    ]
  },
  {
    key:"recoil",
    q:"Quanto tempo hai per allenare il controllo del rinculo?",
    opts:[
      {label:"Poco: voglio un'arma facile da controllare", tags:["control","precision"]},
      {label:"Tanto: sono ok con armi più esigenti", tags:["mobility","aggressive"]}
    ]
  },
  {
    key:"role",
    q:"Che ruolo ricopri di solito nel team?",
    opts:[
      {label:"Entry fragger / prima linea", tags:["close","aggressive","mobility"]},
      {label:"Supporto a distanza / overwatch", tags:["long","control","precision","suppression"]},
      {label:"Flessibile, copro ogni ruolo", tags:["versatile","allround","mid"]}
    ]
  }
];

let quizAnswers = {};
let currentQ = 0;

function renderProgress(){
  const p = document.getElementById('progress');
  p.innerHTML = '';
  QUESTIONS.forEach((_,i)=>{
    const d = document.createElement('div');
    d.className = 'dot' + (i < currentQ ? ' done' : i === currentQ ? ' active' : '');
    d.innerHTML = '<i></i>';
    p.appendChild(d);
  });
  document.getElementById('step-label').textContent = `DOMANDA ${Math.min(currentQ+1, QUESTIONS.length)} DI ${QUESTIONS.length}`;
}

function renderQuestion(){
  clearResult();
  if(currentQ >= QUESTIONS.length){
    showQuizResult();
    return;
  }
  renderProgress();
  const q = QUESTIONS[currentQ];
  const card = document.getElementById('q-card');
  card.innerHTML = `<h2>${q.q}</h2>` + q.opts.map((o,i)=>
    `<button class="opt" onclick="answerQuiz(${i})">${o.label}</button>`
  ).join('');
  document.getElementById('q-card').style.display = 'block';
}

function answerQuiz(i){
  const q = QUESTIONS[currentQ];
  quizAnswers[q.key] = q.opts[i].tags;
  currentQ++;
  renderQuestion();
}

function restartQuiz(){
  quizAnswers = {};
  currentQ = 0;
  document.getElementById('q-card').style.display = 'block';
  renderQuestion();
}

function showQuizResult(){
  document.getElementById('q-card').style.display = 'none';
  document.getElementById('progress').innerHTML = '';
  document.getElementById('step-label').textContent = 'REQUISIZIONE COMPLETATA';

  // score all weapons against collected tags
  const allTags = Object.values(quizAnswers).flat();
  let best = null, bestScore = -1;
  Object.entries(WEAPONS).forEach(([key,w])=>{
    let score = 0;
    w.tags.forEach(t=>{ if(allTags.includes(t)) score++; });
    if(score > bestScore){ bestScore = score; best = key; }
  });

  renderSlip(best, true);

  const restart = document.createElement('button');
  restart.className = 'restart';
  restart.textContent = 'Rifai il questionario';
  restart.onclick = restartQuiz;
  document.getElementById('result-slot').appendChild(restart);
}

/* ============ ARMORY LOGIC ============ */
const FILTERS = [
  {key:"all", label:"Tutte"},
  {key:"SMG", label:"SMG"},
  {key:"Fucile d'Assalto", label:"Assault Rifle"},
  {key:"Fucile di Precisione", label:"Marksman/Sniper"},
  {key:"Mitragliatrice (LMG)", label:"LMG"}
];
let activeFilter = "all";

function renderFilters(){
  const f = document.getElementById('filters');
  f.innerHTML = FILTERS.map(fl =>
    `<button class="${fl.key===activeFilter?'active':''}" onclick="setFilter('${fl.key}')">${fl.label}</button>`
  ).join('');
}
function setFilter(k){
  activeFilter = k;
  renderFilters();
  renderArmory();
}

function renderArmory(){
  const grid = document.getElementById('armory-grid');
  grid.innerHTML = '';
  Object.entries(WEAPONS).forEach(([key,w])=>{
    if(activeFilter !== "all" && w.cat !== activeFilter) return;
    const card = document.createElement('div');
    card.className = 'tag-card';
    card.onclick = ()=>{ clearResult(); renderSlip(key, false); document.getElementById('result-slot').scrollIntoView({behavior:'smooth', block:'start'}); };
    card.innerHTML = `
      <div class="tier">${w.tier}</div>
      <div class="cat">${w.cat}</div>
      <div class="name">${w.name}</div>
      <div class="blurb">${w.blurb}</div>
    `;
    grid.appendChild(card);
  });
}

/* ============ SLIP RENDERING (shared) ============ */
function clearResult(){
  document.getElementById('result-slot').innerHTML = '';
}

function renderSlip(key, fromQuiz){
  const w = WEAPONS[key];
  const slot = document.getElementById('result-slot');
  const slip = document.createElement('div');
  slip.className = 'slip';
  const why = fromQuiz
    ? "In base alle tue risposte, questa è l'arma che meglio si adatta al tuo stile di gioco nel meta corrente."
    : "Loadout attuale per questa arma, secondo il meta della Stagione 4.";
  slip.innerHTML = `
    <div class="slip-head">
      <div class="label">Ordine di requisizione</div>
      <div class="id">TIER ${w.tier} · ${w.cat.toUpperCase()}</div>
    </div>
    <div class="slip-body">
      <div class="cat-line">${w.cat}</div>
      <h2>${w.name}</h2>
      <div class="why">${why}</div>
      ${w.attachments.map(a => `
        <div class="attach-row">
          <div class="slot">${a[0]}</div>
          <div class="part">${a[1]}</div>
        </div>
      `).join('')}
      <div class="sec-box">
        <div class="lbl">Arma secondaria consigliata</div>
        <div class="val">${w.secondary}</div>
      </div>
      <div class="note">${w.note}</div>
    </div>
  `;
  slot.appendChild(slip);
}

/* ============ MODE SWITCH ============ */
function setMode(mode){
  document.getElementById('btn-quiz').classList.toggle('active', mode==='quiz');
  document.getElementById('btn-armory').classList.toggle('active', mode==='armory');
  document.getElementById('view-quiz').classList.toggle('active', mode==='quiz');
  document.getElementById('view-armory').classList.toggle('active', mode==='armory');
  clearResult();
  if(mode === 'quiz'){ restartQuiz(); }
  if(mode === 'armory'){ renderFilters(); renderArmory(); }
}

/* ============ INIT ============ */
renderQuestion();
</script>
